    <title>KoKo | Sign In</title>

<body>



<main class="auth-page">
    <div class="auth-card">

        <img src="../static/images/kokoLogo.png" alt="KoKo" class="auth-logo">

        <h1 class="auth-title">Sign In</h1>

        <form class="auth-form" id="signin-form" autocomplete="off">

            <div id="login-error" class="auth-error"></div>

            <label class="auth-label" for="login-email">Email</label>
            <input type="email" id="login-email" class="auth-input" placeholder="you@example.com" required>

            <label class="auth-label" for="login-password">Password</label>
            <input type="password" id="login-password" class="auth-input" placeholder="••••••••" required>

            <a href="#" class="auth-forgot">Forgot password?</a>

            <button type="submit" class="auth-submit">
                <i class="bi bi-box-arrow-in-right"></i>
                Sign In
            </button>

            <p class="auth-switch">
                New to KoKo?
                <a href="/register" class="auth-switch-link">Create an account</a>
            </p>

        </form>

    </div>
</main>
<footer>

</footer>
