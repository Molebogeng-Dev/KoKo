<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../static/css/style.css">
    <link rel="stylesheet" href="/css/style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <title>KoKo</title>
</head>

<body>

<header>

    <!-- LEFT -->
    <div class="header-left">

        <div class="auth-item" data-tooltip="Sign In">
            <i class="bi bi-box-arrow-in-right auth-icon"></i>
            <span>Sign In</span>
        </div>

        <div class="auth-item" data-tooltip="Sign Up">
            <i class="bi bi-person-plus auth-icon"></i>
            <span>Sign Up</span>
        </div>

    </div>

    <!-- CENTER -->
    <img src="../static/images/kokoLogo.png" alt="KoKo Logo" class="logo">

    <!-- RIGHT -->
    <div class="header-right">

        <div class="auth-item" data-tooltip="About">
            <i class="bi bi-info-circle auth-icon"></i>
            <span>About</span>
        </div>

        <div class="auth-item" data-tooltip="Cart">
            <i class="bi bi-cart3 auth-icon"></i>
            <span>Cart</span>
        </div>

        <div class="auth-item" data-tooltip="Add Business">
            <i class="bi bi-plus-circle auth-icon"></i>
            <span>Add Business</span>
        </div>

    </div>

</header>

<main></main>

<footer>
    <p>&copy; 2026 KoKo. All rights reserved.</p>
</footer>

</body>
</html>
