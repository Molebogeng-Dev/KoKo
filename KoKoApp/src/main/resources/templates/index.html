<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../static/css/style.css">
    <link rel="stylesheet" href="/css/style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <title>KoKo</title>
</head>

<body>

<header>

    <!-- LEFT -->
    <div class="header-left">

        <div class="auth-item" data-tooltip="Sign In">
            <i class="bi bi-box-arrow-in-right auth-icon"></i>
            <span>Sign In</span>
        </div>

        <div class="auth-item" data-tooltip="Sign Up">
            <i class="bi bi-person-plus auth-icon"></i>
            <span>Sign Up</span>
        </div>

    </div>

    <!-- CENTER -->
    <img src="../static/images/kokoLogo.png" alt="/images/kokoLogo.png" class="logo">

    <!-- RIGHT -->
    <div class="header-right">

        <div class="auth-item" data-tooltip="About">
            <i class="bi bi-info-circle auth-icon"></i>
            <span>About</span>
        </div>

        <div class="auth-item" data-tooltip="Cart">
            <i class="bi bi-cart3 auth-icon"></i>
            <span>Cart</span>
        </div>

        <div class="auth-item" data-tooltip="Add Business">
            <i class="bi bi-plus-circle auth-icon"></i>
            <span>Add Business</span>
        </div>

    </div>

</header>

<main>
    <main>

  <!-- TOP RATED SECTION -->
  <section class="top-rated-section">

    <div class="top-rated-header">
      <h2>TOP RATED</h2>
      <p>Swipe to explore top businesses near you</p>
    </div>

    <div class="stories-container">

      <div class="story-card">1</div>
      <div class="story-card">2</div>
      <div class="story-card">3</div>
      <div class="story-card">4</div>
      <div class="story-card">5</div>
      <div class="story-card">6</div>
      <div class="story-card">7</div>
      <div class="story-card">8</div>
      <div class="story-card">9</div>
      <div class="story-card">10</div>
      <div class="story-card">11</div>
      <div class="story-card">12</div>
      <div class="story-card">13</div>
      <div class="story-card">14</div>
      <div class="story-card">15</div>
   

    </div>

  </section>

</main>
</main>

<footer>
    <p>&copy; 2026 KoKo. All rights reserved.</p>
</footer>

</body>
</html>
