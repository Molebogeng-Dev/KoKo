<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../static/css/style.css">
    <link rel="stylesheet" href="/css/style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" >

    <title>KoKo</title>
</head>

<body>

<header>

    <!-- LEFT -->
    <div class="header-left">

        <div class="auth-item" id="signin-trigger" data-tooltip="Sign In">
            <i class="bi bi-box-arrow-in-right auth-icon"></i>
            <span>Sign In</span>
        </div>

        <div class="auth-item" id="signup-trigger" data-tooltip="Sign Up">
            <i class="bi bi-person-plus auth-icon"></i>
            <span>Sign Up</span>
        </div>

    </div>

    <!-- CENTER -->
    <img src="../static/images/kokoLogo.png" alt="/images/kokoLogo.png" class="logo">
    <!-- <img src="images/kokoLogo.png" alt="/images/kokoLogo.png" class="logo"> -->

    <!-- RIGHT -->
    <div class="header-right">

        <div class="auth-item" data-tooltip="About">
            <i class="bi bi-info-circle auth-icon"></i>
            <span>About</span>
        </div>

        <div class="auth-item" data-tooltip="Cart">
            <i class="bi bi-cart3 auth-icon"></i>
            <span>Cart</span>
        </div>

        <div class="auth-item" data-tooltip="Add Business">
            <i class="bi bi-plus-circle auth-icon"></i>
            <span>Add Business</span>
        </div>

    </div>

</header>

<main>

    <!-- TOP RATED SECTION -->
    <section class="top-rated-section">

        <div class="top-rated-header">
            <h2>TOP RATED</h2>
            <p> < - - Swipe to explore top businesses near you - - > </p>
        </div>

        <div class="stories-container">

        <div class="story-card active">1</div>
        <div class="story-card active">2</div>
        <div class="story-card active">3</div>
        <div class="story-card active">4</div>
        <div class="story-card active">5</div>
        <div class="story-card active">6</div>
        <div class="story-card active">7</div>
        <div class="story-card active">8</div>
        <div class="story-card active">9</div>
        <div class="story-card active">10</div>
        <div class="story-card active">11</div>
        <div class="story-card active">12</div>
        <div class="story-card active">13</div>
        <div class="story-card active">14</div>
        <div class="story-card active">15</div>
    
        </div>
    </section>

    

    <!-- MAP SECTION -->
    <section class="map-section">

        <div class="map-header">
            <h2>FIND</h2>
            <p>Search or show categories / Tap the icon on map to view </p>
        </div>
        <!-- SEARCH + CATEGORY BAR -->
        <div class="map-controls">

            <input type="text" class="map-search" placeholder="Search..." />

            <button class="map-btn">
            <i class="bi bi-grid"></i>
            Categories
            </button>

        </div>
        <div id="map" class="map-container"></div>

    </section>
</main>

<footer>

    <!-- BOTTOM ACTION BAR -->
<div class="bottom-actions">

    <button class="bottom-btn right" data-tooltip="AI Waiter">
        <i class="bi bi-cpu"></i>
        <span> AI Waiter</span>
    </button>

    <button class="bottom-btn center" data-tooltip="Explore">
        <i class="bi bi-compass"></i>
        <span>Explore</span>
    </button>

    <button class="bottom-btn left" data-tooltip="Buy / Sell a business">
        <i class="bi bi-arrow-left-right"></i>
        <span>Buy / Sell a business</span>
    </button>

    

</div>
    <p>&copy; 2026 KoKo. All rights reserved.</p>
</footer>


<!-- AUTH OVERLAY (Sign In / Sign Up) -->
<div class="auth-overlay" id="auth-overlay">
    <div class="auth-modal">

        <button class="auth-close" id="auth-close" type="button" aria-label="Close">
            <i class="bi bi-x-lg"></i>
        </button>

        <img src="../static/images/kokoLogo.png" alt="KoKo" class="auth-logo">

        <!-- TAB SWITCHER -->
        <div class="auth-tabs">
            <button class="auth-tab active" id="tab-signin" type="button" data-tab="signin">Sign In</button>
            <button class="auth-tab" id="tab-signup" type="button" data-tab="signup">Sign Up</button>
        </div>

        <!-- SIGN IN FORM -->
        <form class="auth-form active" id="signin-form" autocomplete="off">

            <div id="login-error" class="auth-error"></div>

            <label class="auth-label" for="login-email">Email</label>
            <input type="email" id="login-email" class="auth-input" placeholder="you@example.com" required>

            <label class="auth-label" for="login-password">Password</label>
            <input type="password" id="login-password" class="auth-input" placeholder="••••••••" required>

            <a href="#" class="auth-forgot">Forgot password?</a>

            <button type="submit" class="auth-submit">
                <i class="bi bi-box-arrow-in-right"></i>
                Sign In
            </button>

            <p class="auth-switch">
                New to KoKo?
                <button type="button" class="auth-switch-link" data-tab="signup">Create an account</button>
            </p>

        </form>

        <!-- SIGN UP FORM -->
        <form class="auth-form" id="signup-form" autocomplete="off">

            <div id="reg-error" class="auth-error"></div>

            <label class="auth-label" for="reg-name">Full Name</label>
            <input type="text" id="reg-name" class="auth-input" placeholder="Thabo Mokoena" required>

            <label class="auth-label" for="reg-email">Email</label>
            <input type="email" id="reg-email" class="auth-input" placeholder="you@example.com" required>

            <label class="auth-label" for="reg-phone">Phone Number</label>
            <input type="tel" id="reg-phone" class="auth-input" placeholder="082 123 4567" required>

            <label class="auth-label" for="reg-password">Password</label>
            <input type="password" id="reg-password" class="auth-input" placeholder="••••••••" required>

            <button type="submit" class="auth-submit">
                <i class="bi bi-person-plus"></i>
                Create Account
            </button>

            <p class="auth-switch">
                Already have an account?
                <button type="button" class="auth-switch-link" data-tab="signin">Sign In</button>
            </p>

        </form>

    </div>
</div>

</body>
</html>
