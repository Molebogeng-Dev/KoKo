<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../static/css/style.css">
    <link rel="stylesheet" href="/css/style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <title>KoKo</title>
</head>

<body>

<header>

    <!-- LEFT -->
    <div class="header-left">

        <div class="auth-item" data-tooltip="Sign In">
            <i class="bi bi-box-arrow-in-right auth-icon"></i>
            <span>Sign In</span>
        </div>

        <div class="auth-item" data-tooltip="Sign Up">
            <i class="bi bi-person-plus auth-icon"></i>
            <span>Sign Up</span>
        </div>

    </div>

    <!-- CENTER -->
    <img src="../static/images/kokoLogo.png" alt="/images/kokoLogo.png" class="logo">

    <!-- RIGHT -->
    <div class="header-right">

        <div class="auth-item" data-tooltip="About">
            <i class="bi bi-info-circle auth-icon"></i>
            <span>About</span>
        </div>

        <div class="auth-item" data-tooltip="Cart">
            <i class="bi bi-cart3 auth-icon"></i>
            <span>Cart</span>
        </div>

        <div class="auth-item" data-tooltip="Add Business">
            <i class="bi bi-plus-circle auth-icon"></i>
            <span>Add Business</span>
        </div>

    </div>

</header>

<main>

    <!-- TOP RATED SECTION -->
    <section class="top-rated-section">

        <div class="top-rated-header">
            <h2>TOP RATED</h2>
            <p> < - - Swipe to explore top businesses near you - - > </p>
        </div>

        <div class="stories-container">

        <div class="story-card active">1</div>
        <div class="story-card active">2</div>
        <div class="story-card active">3</div>
        <div class="story-card active">4</div>
        <div class="story-card active">5</div>
        <div class="story-card active">6</div>
        <div class="story-card active">7</div>
        <div class="story-card active">8</div>
        <div class="story-card active">9</div>
        <div class="story-card active">10</div>
        <div class="story-card active">11</div>
        <div class="story-card active">12</div>
        <div class="story-card active">13</div>
        <div class="story-card active">14</div>
        <div class="story-card active">15</div>
    
        </div>
    </section>

    <!-- MAP SECTION -->
    <section class="map-section">

        <div class="map-header">
            <h2>FIND</h2>
            <p>Search or show categories / Tap the icon on map to view </p>
        </div>
        <!-- SEARCH + CATEGORY BAR -->
        <div class="map-controls">

            <input type="text" class="map-search" placeholder="Search..." />

            <button class="map-btn">
            <i class="bi bi-grid"></i>
            Categories
            </button>

        </div>
        <div id="map" class="map-container"></div>

    </section>
</main>

<footer>

    <!-- BOTTOM ACTION BAR -->
<div class="bottom-actions">

    <button class="bottom-btn right" data-tooltip="AI Waiter">
        <i class="bi bi-cpu"></i>
        <span> AI Waiter</span>
    </button>

    <button class="bottom-btn center" data-tooltip="Explore">
        <i class="bi bi-compass"></i>
        <span>Explore</span>
    </button>

    <button class="bottom-btn left" data-tooltip="Buy / Sell a business">
        <i class="bi bi-arrow-left-right"></i>
        <span>Buy / Sell a business</span>
    </button>

    

</div>
    <p>&copy; 2026 KoKo. All rights reserved.</p>
</footer>

</body>
</html>
